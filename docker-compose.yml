version: '3.8'

# ─── PRODUCCIÓN ──────────────────────────────────
# Uso: docker-compose -f docker-compose.yml up --build -d
# El override.yml NO se aplica cuando se pasa el archivo explícitamente

services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sgg
      POSTGRES_USER: sgg_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pg-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sgg_admin -d sgg"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Puerto NO expuesto en producción — solo accesible entre containers

  api:
    build:
      context: ./sgg-api
      dockerfile: Dockerfile
      target: production
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/sgg
      SPRING_DATASOURCE_USERNAME: sgg_admin
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SUPABASE_JWKS_URI: ${SUPABASE_JWKS_URI}
      APP_CORS_WEB_ORIGIN: ${APP_CORS_WEB_ORIGIN}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS}
      SPRING_PROFILES_ACTIVE: prod
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./sgg-web
      dockerfile: Dockerfile
      target: production
      args:
        NEXT_PUBLIC_API_URL: https://${API_DOMAIN}
        NEXT_PUBLIC_SUPABASE_URL: ${SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
    environment:
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      NEXT_PUBLIC_API_URL: https://${API_DOMAIN}
      NEXT_PUBLIC_SUPABASE_URL: ${SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pg-data:
    driver: local
